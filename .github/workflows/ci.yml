name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: Run ruff (linter + formatter check)
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

      - name: Run mypy (type check)
        run: mypy src/

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: langgraph-multi-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test — container starts and /health responds
        run: |
          docker run --rm -d \
            --name langgraph-ci-smoke \
            -p 8000:8000 \
            -e OPENAI_API_KEY=placeholder \
            -e GITHUB_TOKEN=placeholder \
            -e GITHUB_OWNER=placeholder \
            -e GITHUB_REPO=placeholder \
            langgraph-multi-agent:ci
          # Wait up to 30 s for the server to be ready
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health; then
              echo "Health check passed"
              docker stop langgraph-ci-smoke
              exit 0
            fi
            sleep 2
          done
          echo "Health check timed out"
          docker logs langgraph-ci-smoke
          docker stop langgraph-ci-smoke || true
          exit 1
