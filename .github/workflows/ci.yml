name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install lint dependencies
        run: pip install ruff mypy

      - name: Run ruff (linter + formatter check)
        run: ruff check src/ tests/

      - name: Run ruff format check
        run: ruff format --check src/ tests/

      - name: Run mypy (type check)
        run: mypy src/

  docker-build-check:
    name: Docker Build Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: langgraph-multi-agent:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container and verify service health
        run: |
          docker run -d \
            --name langgraph-ci-smoke \
            -p 8000:8000 \
            -e OPENAI_API_KEY=placeholder \
            -e ANTHROPIC_API_KEY=placeholder \
            -e GITHUB_TOKEN=placeholder \
            -e GITHUB_OWNER=placeholder \
            -e GITHUB_REPO=placeholder \
            langgraph-multi-agent:ci

          echo "Waiting for langgraph-poc to be ready..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "✅ /health is up"
              break
            fi
            echo "  attempt $i/15 — not ready yet, retrying in 2 s"
            sleep 2
            if [ "$i" -eq 15 ]; then
              echo "❌ Server did not start within 30 s"
              exit 1
            fi
          done

          echo "--- /health response ---"
          curl -sf http://localhost:8000/health | python3 -m json.tool

          echo "--- /agents response (must list 6 agents) ---"
          AGENTS=$(curl -sf http://localhost:8000/agents)
          echo "$AGENTS" | python3 -m json.tool
          COUNT=$(echo "$AGENTS" | python3 -c "import sys,json; print(len(json.load(sys.stdin)))")
          if [ "$COUNT" -ne 6 ]; then
            echo "❌ Expected 6 agents, got $COUNT"
            exit 1
          fi
          echo "✅ All 6 agents registered"

      - name: Git smoke test — create Python hello-world project and commit inside container
        run: |
          docker exec langgraph-ci-smoke bash -c '
            set -e
            WORKDIR=$(mktemp -d /tmp/hello-world-XXXXXX)
            cd "$WORKDIR"

            # Write a minimal Python hello-world script
            echo "print(\"Hello, World!\")" > hello.py

            # Verify the script runs correctly
            python3 hello.py

            # Initialise git repo, stage, and commit (no push required)
            git init
            git add hello.py
            git commit -m "feat: add hello-world Python script"

            echo "git commit succeeded"
            git log --oneline
          '

      - name: Show container logs and clean up
        if: always()
        run: |
          docker logs langgraph-ci-smoke 2>/dev/null || true
          docker stop langgraph-ci-smoke 2>/dev/null || true
          docker rm  langgraph-ci-smoke 2>/dev/null || true
